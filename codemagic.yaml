workflows:
  ios-diariamente:
    name: Diariamente iOS (Capacitor)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: AppStoreConnectKey
    environment:
      vars:
        BUNDLE_ID: "club.diariamente.app"
        XCODE_SCHEME: "App"
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Instalar dependencias
        script: npm install
      - name: Gerar projeto iOS
        script: |
          npx cap add ios || true
          npx cap sync ios
      - name: Criar certificado e profile
        script: |
          keychain initialize
          app-store-connect certificates create --type IOS_DISTRIBUTION --save || true
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
      - name: Instalar Pods
        script: |
          cd ios/App && pod install
      - name: Aplicar profile no projeto
        script: |
          xcode-project use-profiles
      - name: Build do ipa
        script: |
          xcode-project build-ipa --workspace "ios/App/App.xcworkspace" --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
