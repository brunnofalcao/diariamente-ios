workflows:
  ios-diariamente:
    name: Diariamente iOS (Capacitor)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: AppStoreConnectKey
    environment:
      vars:
        BUNDLE_ID: "club.diariamente.app"
        XCODE_SCHEME: "App"
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Instalar dependencias
        script: npm install
      - name: Gerar projeto iOS
        script: |
          npx cap add ios || true
          npx cap sync ios
      - name: Forcar idioma pt-BR no binario (idioma principal do app)
        script: |
          set -e
          PLIST="ios/App/App/Info.plist"
          PBX="ios/App/App.xcodeproj/project.pbxproj"
          /usr/libexec/PlistBuddy -c "Set :CFBundleDevelopmentRegion pt-BR" "$PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Add :CFBundleDevelopmentRegion string pt-BR" "$PLIST"
          /usr/libexec/PlistBuddy -c "Delete :CFBundleLocalizations" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleLocalizations array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleLocalizations:0 string pt-BR" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleLocalizations:1 string pt" "$PLIST"
          sed -i '' 's/developmentRegion = en;/developmentRegion = "pt-BR";/g' "$PBX"
          mkdir -p "ios/App/App/pt-BR.lproj"
          printf '"CFBundleDisplayName" = "Diariamente";\n"CFBundleName" = "Diariamente";\n' > "ios/App/App/pt-BR.lproj/InfoPlist.strings"
          echo "=== CONFERENCIA DE IDIOMA ==="
          /usr/libexec/PlistBuddy -c "Print :CFBundleDevelopmentRegion" "$PLIST"
          /usr/libexec/PlistBuddy -c "Print :CFBundleLocalizations" "$PLIST"
      - name: Baixar icone oficial e gerar
        script: |
          mkdir -p assets
          curl -L -o assets/icon.png "https://res.cloudinary.com/dlzrfhwin/image/upload/f_png,w_1024,h_1024,c_fill/v1776688513/iOs_Icon_-_Diariamente_8_ydzqht.png"
          curl -L -o assets/splash.png "https://res.cloudinary.com/dlzrfhwin/image/upload/f_png,c_fit,w_1200/c_pad,w_2732,h_2732,b_rgb:0A0E0E/v1775400164/Asset_10_cirv6z.png"
          npx @capacitor/assets generate --ios
      - name: Criar certificado e profile
        script: |
          keychain initialize
          openssl genrsa -out /tmp/dist.key 2048
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --certificate-key @file:/tmp/dist.key --create
          keychain add-certificates
      - name: Instalar Pods
        script: |
          cd ios/App && pod install
      - name: Aplicar profile no projeto
        script: |
          xcode-project use-profiles
      - name: Definir versao (1.0.1) e build number
        script: |
          cd ios/App
          agvtool new-marketing-version 1.0.1
          agvtool new-version -all "$BUILD_NUMBER"
      - name: Build do ipa
        script: |
          xcode-project build-ipa --workspace "ios/App/App.xcworkspace" --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
