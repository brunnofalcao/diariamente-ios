workflows:
  ios-diariamente:
    name: Diariamente iOS (Capacitor)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: AppStoreConnectKey
    environment:
      vars:
        BUNDLE_ID: "club.diariamente.app"
        XCODE_SCHEME: "App"
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Instalar dependencias
        script: npm install
      - name: Gerar projeto iOS
        script: |
          npx cap add ios || true
          npx cap sync ios
      - name: Baixar icone oficial e gerar
        script: |
          mkdir -p assets
          curl -L -o assets/icon.png "https://res.cloudinary.com/dlzrfhwin/image/upload/f_png,w_1024,h_1024,c_fill/v1776688513/iOs_Icon_-_Diariamente_8_ydzqht.png"
          curl -L -o assets/splash.png "https://res.cloudinary.com/dlzrfhwin/image/upload/f_png,c_fit,w_900/c_pad,w_2732,h_2732,b_rgb:0A0E0E/v1776688513/iOs_Icon_-_Diariamente_8_ydzqht.png"
          npx @capacitor/assets generate --ios
      - name: Criar certificado e profile
        script: |
          keychain initialize
          openssl genrsa -out /tmp/dist.key 2048
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --certificate-key @file:/tmp/dist.key --create
          keychain add-certificates
      - name: Instalar Pods
        script: |
          cd ios/App && pod install
      - name: Aplicar profile no projeto
        script: |
          xcode-project use-profiles
      - name: Definir build number
        script: |
          cd ios/App && agvtool new-version -all "$BUILD_NUMBER"
      - name: Build do ipa
        script: |
          xcode-project build-ipa --workspace "ios/App/App.xcworkspace" --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
