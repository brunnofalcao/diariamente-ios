workflows:
  ios-diariamente:
    name: Diariamente iOS (Capacitor)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: AppStoreConnectKey   # nome da chave que você cadastra no Codemagic (Teams > Integrations)
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: club.diariamente.app
      vars:
        APP_STORE_APPLE_ID: 6762151251         # Apple ID do app (ja existe na sua conta)
        BUNDLE_ID: "club.diariamente.app"
        XCODE_SCHEME: "App"
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Instalar dependencias
        script: npm install
      - name: Gerar projeto iOS (Capacitor)
        script: |
          npx cap add ios || true
          npx cap sync ios
      - name: Configurar assinatura (automatica via App Store Connect API)
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Instalar Pods
        script: |
          cd ios/App && pod install
      - name: Build do .ipa
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true   # sobe direto pro TestFlight; depois voce anexa a versao e reenvia
